name: Daily Content Auto-Scheduler

on:
  schedule:
    # Schedule runs in UTC (IST is UTC +5:30)
    # 03:30 UTC = 09:00 AM IST (Morning Slot: Feed Post)
    - cron: '30 3 * * *'
    # 12:30 UTC = 06:00 PM IST (Afternoon Slot: Reel)
    - cron: '30 12 * * *'
    # 14:30 UTC = 08:00 PM IST (Evening Slot: Feed Post)
    - cron: '30 14 * * *'
  workflow_dispatch:
    inputs:
      trigger_type:
        description: 'Trigger slot type (auto, post, reel)'
        required: false
        default: 'auto'
      category:
        description: 'Category for post (auto, Anonymous Confessions, Intimate Secrets)'
        required: false
        default: 'auto'
  repository_dispatch:
    types: [run-scheduler]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  run-scheduler:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run scheduled posting workflow
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          PAGE_HANDLE: '@unspokendesireshub'
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: 'alternate'
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          BUFFER_CHANNEL_ID: ${{ secrets.BUFFER_CHANNEL_ID }}
          IS_SIMULATION_MODE: 'false'
          TRIGGER_TYPE: ${{ github.event.inputs.trigger_type || github.event.client_payload.trigger_type || 'auto' }}
          CATEGORY_OVERRIDE: ${{ github.event.inputs.category || github.event.client_payload.category || 'auto' }}
          SCHEDULE_CRON: ${{ github.event.schedule }}
        run: node run-slot-post.js

      - name: Commit and Push generated assets
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/db.json
          # Add data/posts directory if there are new files
          if [ -d "data/posts" ]; then
            git add data/posts/
          fi
          git commit -m "Auto-generated scheduled assets [skip ci]" || echo "No changes to commit"
          git fetch origin
          git rebase origin/${{ github.ref_name }} || echo "Rebase skipped or failed"
          git push origin HEAD:${{ github.ref_name }}
